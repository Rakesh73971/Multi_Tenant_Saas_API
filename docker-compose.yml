services:
  db:
    image: postgres:15-alpine
    container_name: saas_db
    environment:
      POSTGRES_USER: ${DB_USER:-saas_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saas_password}
      POSTGRES_DB: ${DB_NAME:-saas_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: saas_backend:latest  # Tell Docker to name the built image
    container_name: saas_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER:-saas_user}:${DB_PASSWORD:-saas_password}@db:5432/${DB_NAME:-saas_db}
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      - CELERY_BROKER_URL=redis://redis:${REDIS_PORT:-6379}/1
      - DEBUG=${DEBUG:-True}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    # Removed "build: ." and replaced it with the image built by the web service
    image: saas_backend:latest
    container_name: saas_celery
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/code
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER:-saas_user}:${DB_PASSWORD:-saas_password}@db:5432/${DB_NAME:-saas_db}
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      - CELERY_BROKER_URL=redis://redis:${REDIS_PORT:-6379}/1
      - DEBUG=${DEBUG:-True}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: